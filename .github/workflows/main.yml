name: build-apk

on:
  push:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: android-actions/setup-android@v3

      - name: Locate the Gradle project
        run: |
          SETTINGS=$(find . -name 'settings.gradle*' | head -1)
          if [ -z "$SETTINGS" ]; then
            echo "::error::No settings.gradle found. The project files weren't uploaded to this repo."
            exit 1
          fi
          DIR=$(dirname "$SETTINGS")
          echo "Found Gradle project in: $DIR"
          echo "PROJECT_DIR=$DIR" >> "$GITHUB_ENV"

      - name: Build debug APK
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          gradle wrapper --gradle-version 8.5
          ./gradlew assembleDebug --stacktrace

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: boost-spike-debug-apk
          path: ${{ env.PROJECT_DIR }}/app/build/outputs/apk/debug/app-debug.apk

      - name: Publish APK to a Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: spike-latest
          name: Boost Spike (debug APK)
          prerelease: true
          files: ${{ env.PROJECT_DIR }}/app/build/outputs/apk/debug/app-debug.apk
